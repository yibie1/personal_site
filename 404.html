<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting... | Yibeltal Simachew</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Converts /projects -> /?p=/projects so index.html can handle it
    (function () {
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;

      // Map clean routes to actual HTML files
      var routes = {
        '/projects': '/projects/index.html',
        '/experience': '/experience/index.html',
      };

      // Check if it's a known route
      for (var route in routes) {
        if (path === route || path === route + '/') {
          window.location.replace(routes[route] + search + hash);
          return;
        }
      }

      // Unknown path — show 404 page after short delay
      document.title = 'Page Not Found | Yibeltal Simachew';
    }());
  </script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #060818;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .code { font-size: 10rem; font-weight: 800; color: #5b3fff; line-height: 1; }
    h2 { font-size: 2.5rem; margin: 1.5rem 0 1rem; color: #e8eeff; }
    p  { font-size: 1.6rem; color: rgba(200,210,255,0.6); margin-bottom: 3rem; }
    a  {
      display: inline-flex; align-items: center; gap: 0.8rem;
      padding: 1.2rem 3rem;
      background: linear-gradient(135deg, #5b3fff, #8b5cf6);
      color: #fff; border-radius: 0.6rem;
      font-size: 1.5rem; font-weight: 700; font-family: 'Poppins', sans-serif;
      text-decoration: none;
      box-shadow: 0 4px 18px rgba(91,63,255,0.4);
    }
    a:hover { background: linear-gradient(135deg, #4c35d4, #7c4fe0); }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h2>Page Not Found</h2>
  <p>The page you're looking for doesn't exist.</p>
  <a href="/">&#8592; Back to Home</a>
</body>
</html>
